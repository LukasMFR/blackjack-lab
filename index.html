<!DOCTYPE html>
<html lang="en" data-theme="salon" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Blackjack Lab: a fictional-money blackjack simulator with authentic international rule profiles.">
  <title>Blackjack Lab</title>
  <link rel="icon" type="image/svg+xml" href="src/assets/logo/favicon.svg">
  <link rel="stylesheet" href="src/styles/tokens.css">
  <link rel="stylesheet" href="src/styles/base.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/cards.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/theme-salon.css">
</head>
<body>
  <a class="skip-link" href="#table" id="skip-link">Skip to the game table</a>

  <header class="app-header">
    <div class="brand">
      <svg class="brand__logo" viewBox="0 0 96 96" aria-hidden="true" focusable="false">
        <defs>
          <clipPath id="brand-mark-left"><rect width="48" height="96"/></clipPath>
          <clipPath id="brand-mark-right"><rect x="48" width="48" height="96"/></clipPath>
        </defs>
        <g clip-path="url(#brand-mark-left)">
          <path class="brand__logo-ink" d="M48 6C41 19 22 31 15 46C10 57 15 68 24 71.5C31.5 74.5 39.5 72 43.5 65.5C43.8 73 41 82 33.5 88.5L62.5 88.5C55 82 52.2 73 52.5 65.5C56.5 72 64.5 74.5 72 71.5C81 68 86 57 81 46C74 31 55 19 48 6Z"/>
        </g>
        <g clip-path="url(#brand-mark-right)" class="brand__logo-line" fill="none" stroke-width="2.4">
          <path d="M48 6C41 19 22 31 15 46C10 57 15 68 24 71.5C31.5 74.5 39.5 72 43.5 65.5C43.8 73 41 82 33.5 88.5L62.5 88.5C55 82 52.2 73 52.5 65.5C56.5 72 64.5 74.5 72 71.5C81 68 86 57 81 46C74 31 55 19 48 6Z"/>
        </g>
        <path class="brand__logo-line" d="M48 1L48 93" fill="none" stroke-width="1.3"/>
      </svg>
      <h1 class="brand__name">Blackjack Lab</h1>
      <span class="badge badge--fictional" id="fictional-badge"></span>
    </div>
    <div class="header-actions">
      <div class="menu-select select--compact" id="language-menu">
        <span class="sr-only" id="language-label"></span>
        <button type="button" class="menu-select__button" id="language-button" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-controls="language-listbox" aria-labelledby="language-label language-value">
          <svg class="menu-select__globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18"/>
            <path d="M12 3a14.5 14.5 0 0 0 0 18 14.5 14.5 0 0 0 0-18"/>
          </svg>
          <!-- The code is shorthand for sighted users. The name is built from
               #language-value rather than the button, so the code never has to
               be excluded from it. -->
          <span class="menu-select__code" id="language-code" aria-hidden="true"></span>
          <span class="menu-select__value sr-only" id="language-value"></span>
          <svg class="menu-select__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>
        <ul class="menu-select__list" id="language-listbox" role="listbox" aria-labelledby="language-label" hidden>
          <li class="menu-select__option" id="language-option-en" role="option" data-value="en" aria-selected="false">
            <span>English</span>
            <svg class="menu-select__check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m5 12.5 4.5 4.5L19 7.5"/>
            </svg>
          </li>
          <li class="menu-select__option" id="language-option-fr" role="option" data-value="fr" aria-selected="false">
            <span>Français</span>
            <svg class="menu-select__check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m5 12.5 4.5 4.5L19 7.5"/>
            </svg>
          </li>
        </ul>
      </div>
      <button type="button" id="btn-sound" class="btn btn--ghost btn--icon" aria-pressed="false">
        <svg class="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 5 6.5 8.5H3.5v7h3L11 19z"/>
          <path d="M15 9.5a3.6 3.6 0 0 1 0 5"/>
          <path d="M17.7 7a7.2 7.2 0 0 1 0 10"/>
        </svg>
        <svg class="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
          <path d="M11 5 6.5 8.5H3.5v7h3L11 19z"/>
          <path d="m15.5 9.5 5 5M20.5 9.5l-5 5"/>
        </svg>
      </button>
      <button type="button" id="btn-help" class="btn btn--ghost" aria-haspopup="dialog"></button>
      <button type="button" id="btn-settings" class="btn btn--ghost" aria-haspopup="dialog"></button>
    </div>
  </header>

  <div class="layout">
    <main class="table-column">
      <section class="table" id="table" tabindex="-1">
        <section class="hand-area hand-area--dealer" aria-labelledby="dealer-label">
          <header class="hand-header">
            <h2 class="hand-name" id="dealer-label"></h2>
            <span class="hand-total" id="dealer-total" hidden></span>
          </header>
          <div class="cards" id="dealer-cards"></div>
        </section>

        <p class="table-message" id="table-message"></p>

        <section class="hand-area hand-area--player" aria-labelledby="player-label">
          <h2 class="sr-only" id="player-label"></h2>
          <div class="hands" id="player-hands"></div>
        </section>
      </section>

      <section class="controls" id="controls" aria-labelledby="controls-label">
        <h2 class="sr-only" id="controls-label"></h2>

        <div class="status-strip">
          <div class="stat">
            <span class="stat__label" id="bankroll-label"></span>
            <strong class="stat__value" id="bankroll-value"></strong>
          </div>
          <div class="stat stat--bet">
            <span class="stat__label" id="bet-label"></span>
            <strong class="stat__value" id="bet-value"></strong>
          </div>
          <span class="shoe-count" id="shoe-count"></span>
        </div>

        <div id="panel-bet" class="panel" hidden>
          <p class="panel__prompt" id="bet-prompt"></p>
          <div class="chip-row" id="chip-row" role="group"></div>
          <div class="button-row">
            <button type="button" id="btn-clear" class="btn"></button>
            <button type="button" id="btn-rebet" class="btn"></button>
            <button type="button" id="btn-deal" class="btn btn--primary"></button>
          </div>
          <p class="fine-print" id="table-range"></p>
        </div>

        <div id="panel-actions" class="panel" hidden>
          <div class="button-row button-row--actions" role="group" aria-labelledby="controls-label">
            <button type="button" data-action="HIT" class="btn btn--action btn--action-primary">
              <span class="btn__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="6" y="3.5" width="12" height="17" rx="2.2"/>
                  <path d="M12 8.75v6.5M8.75 12h6.5"/>
                </svg>
              </span>
              <span class="btn__label"></span>
            </button>
            <button type="button" data-action="STAND" class="btn btn--action btn--action-primary">
              <span class="btn__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 11V6a2 2 0 0 0-4 0v5"/>
                  <path d="M14 10V4a2 2 0 0 0-4 0v2"/>
                  <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
                  <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
                </svg>
              </span>
              <span class="btn__label"></span>
            </button>
            <button type="button" data-action="DOUBLE" class="btn btn--action btn--action-secondary">
              <span class="btn__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <ellipse cx="12" cy="7" rx="7" ry="3"/>
                  <path d="M5 7v4.75c0 1.66 3.13 3 7 3s7-1.34 7-3V7"/>
                  <path d="M5 11.75v4.75c0 1.66 3.13 3 7 3s7-1.34 7-3v-4.75"/>
                </svg>
              </span>
              <span class="btn__label"></span>
            </button>
            <button type="button" data-action="SPLIT" class="btn btn--action btn--action-secondary">
              <span class="btn__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 21v-7"/>
                  <path d="M12 14 5.5 7.5m6.5 6.5 6.5-6.5"/>
                  <path d="M10 7.5H5.5V12"/>
                  <path d="M14 7.5h4.5V12"/>
                </svg>
              </span>
              <span class="btn__label"></span>
            </button>
            <button type="button" data-action="SURRENDER" class="btn btn--action"></button>
          </div>
        </div>

        <div id="panel-decision" class="panel" hidden>
          <p class="panel__prompt" id="decision-question"></p>
          <div class="button-row">
            <button type="button" id="btn-decision-no" class="btn"></button>
            <button type="button" id="btn-decision-yes" class="btn btn--primary"></button>
          </div>
        </div>

        <div id="panel-complete" class="panel" hidden>
          <p class="panel__prompt panel__prompt--result" id="round-net"></p>
          <div class="button-row">
            <button type="button" id="btn-next" class="btn btn--primary"></button>
          </div>
        </div>
      </section>

      <p class="fictional-note" id="fictional-note"></p>
    </main>

    <aside class="side-column">
      <div class="side-inner">
      <button type="button" id="btn-profile" class="side-card profile-chip" aria-haspopup="dialog">
        <span class="side-title" id="profile-title"></span>
        <span class="profile-chip__name" id="profile-chip-name"></span>
        <span class="profile-chip__meta" id="profile-chip-meta"></span>
      </button>

      <section class="side-card session" aria-labelledby="session-title">
        <h2 class="side-title" id="session-title"></h2>
        <dl class="session__stats">
          <div class="session__row">
            <dt id="session-rounds-label"></dt>
            <dd id="session-rounds"></dd>
          </div>
          <div class="session__row">
            <dt id="session-net-label"></dt>
            <dd id="session-net"></dd>
          </div>
        </dl>
      </section>

      <section class="side-card history" aria-labelledby="history-title">
        <h2 class="side-title" id="history-title"></h2>
        <ol class="history__list" id="history-list"></ol>
        <p class="history__empty fine-print" id="history-empty"></p>
      </section>
      </div>
    </aside>
  </div>

  <div class="sr-only" aria-live="polite" id="live-region"></div>
  <div class="toast" id="toast" role="status" hidden></div>

  <dialog class="dialog dialog--wide" id="dialog-settings" aria-labelledby="settings-title">
    <header class="dialog__header">
      <h2 id="settings-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <div class="dialog__body">
      <fieldset class="field-group">
        <legend id="set-language-label"></legend>
        <div class="segment" id="settings-language" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-appearance-label"></legend>
        <div class="segment" id="settings-appearance" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-theme-label"></legend>
        <div class="segment" id="settings-theme" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-audio-label"></legend>
        <div class="audio-controls" id="audio-controls"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-profile-label"></legend>
        <p class="fine-print" id="profile-note"></p>
        <div class="profile-list" id="profile-list" role="radiogroup"></div>
        <p class="fine-print" id="profile-change-note"></p>
      </fieldset>
      <form class="custom-editor" id="custom-editor" hidden></form>
      <div class="field-group field-group--danger">
        <button type="button" id="btn-set-bankroll" class="btn btn--danger"></button>
        <p class="fine-print" id="bankroll-locked-note" hidden></p>
      </div>
    </div>
  </dialog>

  <dialog class="dialog dialog--wide" id="dialog-help" aria-labelledby="help-title">
    <header class="dialog__header">
      <h2 id="help-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <div class="dialog__body" id="help-body"></div>
  </dialog>

  <dialog class="dialog dialog--confirm" id="dialog-bankroll" aria-labelledby="bankroll-title">
    <header class="dialog__header">
      <h2 id="bankroll-title"></h2>
    </header>
    <form class="dialog__body" id="bankroll-form" novalidate>
      <p class="callout callout--warning" id="bankroll-warning"></p>
      <div class="field">
        <label for="bankroll-amount" id="bankroll-amount-label"></label>
        <input class="text-input" type="text" id="bankroll-amount" inputmode="numeric"
               autocomplete="off" spellcheck="false"
               aria-describedby="bankroll-hint bankroll-error">
        <p class="fine-print" id="bankroll-hint"></p>
        <p class="field__error" id="bankroll-error" role="alert" hidden></p>
      </div>
      <div class="button-row">
        <button type="button" id="btn-bankroll-cancel" class="btn"></button>
        <button type="submit" id="btn-bankroll-confirm" class="btn btn--danger"></button>
      </div>
    </form>
  </dialog>

  <script type="module" src="src/js/ui/app.js"></script>
</body>
</html>
