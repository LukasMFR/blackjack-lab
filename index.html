<!DOCTYPE html>
<html lang="en" data-theme="classic" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Blackjack Lab: a fictional-money blackjack simulator with authentic international rule profiles.">
  <title>Blackjack Lab</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231f5138'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='%23f5f2ea'%3E%E2%99%A0%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="src/styles/tokens.css">
  <link rel="stylesheet" href="src/styles/base.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/cards.css">
  <link rel="stylesheet" href="src/styles/components.css">
</head>
<body>
  <a class="skip-link" href="#table" id="skip-link">Skip to the game table</a>

  <header class="app-header">
    <div class="brand">
      <h1 class="brand__name">Blackjack Lab</h1>
      <span class="badge badge--fictional" id="fictional-badge"></span>
    </div>
    <div class="header-actions">
      <label class="sr-only" for="language-select" id="language-label"></label>
      <select id="language-select" class="select select--compact">
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
      <button type="button" id="btn-help" class="btn btn--ghost" aria-haspopup="dialog"></button>
      <button type="button" id="btn-settings" class="btn btn--ghost" aria-haspopup="dialog"></button>
    </div>
  </header>

  <div class="layout">
    <main class="table-column">
      <button type="button" id="btn-profile" class="profile-chip" aria-haspopup="dialog">
        <span class="profile-chip__name" id="profile-chip-name"></span>
        <span class="profile-chip__meta" id="profile-chip-meta"></span>
      </button>

      <section class="table" id="table" tabindex="-1">
        <section class="hand-area hand-area--dealer" aria-labelledby="dealer-label">
          <header class="hand-header">
            <h2 class="hand-name" id="dealer-label"></h2>
            <span class="hand-total" id="dealer-total" hidden></span>
          </header>
          <div class="cards" id="dealer-cards"></div>
        </section>

        <p class="table-message" id="table-message"></p>

        <section class="hand-area hand-area--player" aria-labelledby="player-label">
          <h2 class="sr-only" id="player-label"></h2>
          <div class="hands" id="player-hands"></div>
        </section>
      </section>

      <section class="controls" id="controls" aria-labelledby="controls-label">
        <h2 class="sr-only" id="controls-label"></h2>

        <div class="status-strip">
          <div class="stat">
            <span class="stat__label" id="bankroll-label"></span>
            <strong class="stat__value" id="bankroll-value"></strong>
          </div>
          <div class="stat stat--bet">
            <span class="stat__label" id="bet-label"></span>
            <strong class="stat__value" id="bet-value"></strong>
          </div>
          <span class="shoe-count" id="shoe-count"></span>
        </div>

        <div id="panel-bet" class="panel" hidden>
          <p class="panel__prompt" id="bet-prompt"></p>
          <div class="chip-row" id="chip-row" role="group"></div>
          <div class="button-row">
            <button type="button" id="btn-clear" class="btn"></button>
            <button type="button" id="btn-rebet" class="btn"></button>
            <button type="button" id="btn-deal" class="btn btn--primary"></button>
          </div>
          <p class="fine-print" id="table-range"></p>
        </div>

        <div id="panel-actions" class="panel" hidden>
          <div class="button-row button-row--actions" role="group" aria-labelledby="controls-label">
            <button type="button" data-action="HIT" class="btn btn--action"></button>
            <button type="button" data-action="STAND" class="btn btn--action"></button>
            <button type="button" data-action="DOUBLE" class="btn btn--action"></button>
            <button type="button" data-action="SPLIT" class="btn btn--action"></button>
            <button type="button" data-action="SURRENDER" class="btn btn--action"></button>
          </div>
        </div>

        <div id="panel-decision" class="panel" hidden>
          <p class="panel__prompt" id="decision-question"></p>
          <div class="button-row">
            <button type="button" id="btn-decision-no" class="btn"></button>
            <button type="button" id="btn-decision-yes" class="btn btn--primary"></button>
          </div>
        </div>

        <div id="panel-complete" class="panel" hidden>
          <p class="panel__prompt panel__prompt--result" id="round-net"></p>
          <div class="button-row">
            <button type="button" id="btn-next" class="btn btn--primary"></button>
          </div>
        </div>
      </section>

      <p class="fictional-note" id="fictional-note"></p>
    </main>

    <aside class="side-column">
      <section class="history" aria-labelledby="history-title">
        <h2 class="history__title" id="history-title"></h2>
        <ol class="history__list" id="history-list"></ol>
        <p class="history__empty fine-print" id="history-empty"></p>
      </section>
    </aside>
  </div>

  <div class="sr-only" aria-live="polite" id="live-region"></div>
  <div class="toast" id="toast" role="status" hidden></div>

  <dialog class="dialog" id="dialog-settings" aria-labelledby="settings-title">
    <header class="dialog__header">
      <h2 id="settings-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <div class="dialog__body">
      <fieldset class="field-group">
        <legend id="set-language-label"></legend>
        <div class="segment" id="settings-language" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-appearance-label"></legend>
        <div class="segment" id="settings-appearance" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-theme-label"></legend>
        <div class="segment" id="settings-theme" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-profile-label"></legend>
        <p class="fine-print" id="profile-note"></p>
        <div class="profile-list" id="profile-list" role="radiogroup"></div>
        <p class="fine-print" id="profile-change-note"></p>
      </fieldset>
      <form class="custom-editor" id="custom-editor" hidden></form>
      <div class="field-group field-group--danger">
        <button type="button" id="btn-reset-bankroll" class="btn btn--danger"></button>
      </div>
    </div>
  </dialog>

  <dialog class="dialog" id="dialog-help" aria-labelledby="help-title">
    <header class="dialog__header">
      <h2 id="help-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <div class="dialog__body" id="help-body"></div>
  </dialog>

  <dialog class="dialog dialog--confirm" id="dialog-reset" aria-labelledby="reset-title">
    <header class="dialog__header">
      <h2 id="reset-title"></h2>
    </header>
    <div class="dialog__body">
      <p id="reset-body"></p>
      <div class="button-row">
        <button type="button" id="btn-reset-cancel" class="btn"></button>
        <button type="button" id="btn-reset-confirm" class="btn btn--danger"></button>
      </div>
    </div>
  </dialog>

  <script type="module" src="src/js/ui/app.js"></script>
</body>
</html>
