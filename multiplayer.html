<!DOCTYPE html>
<html lang="en" data-theme="salon" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Blackjack Lab local multiplayer: host or join a fictional-money blackjack table over your own local network.">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f4ecdb">
  <title>Blackjack Lab · Local multiplayer</title>
  <link rel="icon" type="image/svg+xml" href="src/assets/logo/favicon.svg">
  <link rel="stylesheet" href="src/styles/tokens.css">
  <link rel="stylesheet" href="src/styles/base.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/cards.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/theme-salon.css">
  <link rel="stylesheet" href="src/styles/animations.css">
  <link rel="stylesheet" href="src/styles/multiplayer.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="brand__logo" viewBox="0 0 96 96" aria-hidden="true" focusable="false">
        <defs>
          <clipPath id="brand-mark-left"><rect width="48" height="96"/></clipPath>
          <clipPath id="brand-mark-right"><rect x="48" width="48" height="96"/></clipPath>
        </defs>
        <g clip-path="url(#brand-mark-left)">
          <path class="brand__logo-ink" d="M48 6C41 19 22 31 15 46C10 57 15 68 24 71.5C31.5 74.5 39.5 72 43.5 65.5C43.8 73 41 82 33.5 88.5L62.5 88.5C55 82 52.2 73 52.5 65.5C56.5 72 64.5 74.5 72 71.5C81 68 86 57 81 46C74 31 55 19 48 6Z"/>
        </g>
        <g clip-path="url(#brand-mark-right)" class="brand__logo-line" fill="none" stroke-width="2.4">
          <path d="M48 6C41 19 22 31 15 46C10 57 15 68 24 71.5C31.5 74.5 39.5 72 43.5 65.5C43.8 73 41 82 33.5 88.5L62.5 88.5C55 82 52.2 73 52.5 65.5C56.5 72 64.5 74.5 72 71.5C81 68 86 57 81 46C74 31 55 19 48 6Z"/>
        </g>
        <path class="brand__logo-line" d="M48 1L48 93" fill="none" stroke-width="1.3"/>
      </svg>
      <h1 class="brand__name">Blackjack Lab</h1>
    </div>
    <div class="header-actions">
      <div class="menu-select select--compact" id="language-menu">
        <span class="sr-only" id="language-label"></span>
        <button type="button" class="menu-select__button" id="language-button" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-controls="language-listbox" aria-labelledby="language-label language-value">
          <svg class="menu-select__globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18"/>
            <path d="M12 3a14.5 14.5 0 0 0 0 18 14.5 14.5 0 0 0 0-18"/>
          </svg>
          <span class="menu-select__code" id="language-code" aria-hidden="true"></span>
          <span class="menu-select__value sr-only" id="language-value"></span>
          <svg class="menu-select__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>
        <ul class="menu-select__list" id="language-listbox" role="listbox" aria-labelledby="language-label" hidden>
          <li class="menu-select__option" id="language-option-en" role="option" data-value="en" aria-selected="false">
            <span>English</span>
            <svg class="menu-select__check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m5 12.5 4.5 4.5L19 7.5"/>
            </svg>
          </li>
          <li class="menu-select__option" id="language-option-fr" role="option" data-value="fr" aria-selected="false">
            <span>Français</span>
            <svg class="menu-select__check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m5 12.5 4.5 4.5L19 7.5"/>
            </svg>
          </li>
        </ul>
      </div>
      <button type="button" id="btn-sound" class="btn btn--ghost btn--icon" aria-pressed="false">
        <svg class="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 5 6.5 8.5H3.5v7h3L11 19z"/>
          <path d="M15 9.5a3.6 3.6 0 0 1 0 5"/>
          <path d="M17.7 7a7.2 7.2 0 0 1 0 10"/>
        </svg>
        <svg class="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
          <path d="M11 5 6.5 8.5H3.5v7h3L11 19z"/>
          <path d="m15.5 9.5 5 5M20.5 9.5l-5 5"/>
        </svg>
      </button>
      <!-- tabindex="0" on every link: Safari drops links from the tab sequence
           unless "Press Tab to highlight each item" is switched on, and it is
           off by default. Other browsers are unaffected — the link keeps its
           document-order position. -->
      <a href="index.html" id="btn-solo-link" class="btn btn--ghost btn--icon" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="3.8"/>
          <path d="M5.2 20.5a6.8 6.8 0 0 1 13.6 0"/>
        </svg>
      </a>
      <button type="button" id="btn-help" class="btn btn--ghost btn--icon" aria-haspopup="dialog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9.6 9.3a2.5 2.5 0 0 1 4.9.7c0 1.7-2.5 2.3-2.5 3.6"/>
          <path d="M12 16.6h.01"/>
        </svg>
      </button>
      <button type="button" id="btn-settings" class="btn btn--ghost btn--icon" aria-haspopup="dialog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.50 9.72A8.8 8.8 0 0 1 20.50 14.28L18.22 13.90A6.5 6.5 0 0 1 16.75 16.43L18.22 18.22A8.8 8.8 0 0 1 14.28 20.50L13.46 18.33A6.5 6.5 0 0 1 10.54 18.33L9.72 20.50A8.8 8.8 0 0 1 5.78 18.22L7.25 16.43A6.5 6.5 0 0 1 5.78 13.90L3.50 14.28A8.8 8.8 0 0 1 3.50 9.72L5.78 10.10A6.5 6.5 0 0 1 7.25 7.57L5.78 5.78A8.8 8.8 0 0 1 9.72 3.50L10.54 5.67A6.5 6.5 0 0 1 13.46 5.67L14.28 3.50A8.8 8.8 0 0 1 18.22 5.78L16.75 7.57A6.5 6.5 0 0 1 18.22 10.10Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="mp-main">

    <!-- Mode menu -->
    <section class="mp-screen" id="screen-menu" hidden>
      <h2 class="mp-title" id="menu-title"></h2>
      <p class="mp-tagline" id="menu-tagline"></p>
      <div class="mp-menu">
        <a class="mp-menu-card" href="index.html" id="menu-solo" tabindex="0">
          <span class="mp-menu-card__badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="3.8"/>
              <path d="M5.2 20.5a6.8 6.8 0 0 1 13.6 0"/>
            </svg>
          </span>
          <strong class="mp-menu-card__name" id="menu-solo-name"></strong>
          <span class="mp-menu-card__desc" id="menu-solo-desc"></span>
        </a>
        <button type="button" class="mp-menu-card" id="menu-host">
          <span class="mp-menu-card__badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="8.5" r="3.4"/>
              <path d="M3.2 20a5.8 5.8 0 0 1 11.6 0"/>
              <path d="M16.4 5.6a3.4 3.4 0 0 1 0 5.8"/>
              <path d="M17.4 14.6a5.8 5.8 0 0 1 3.4 5.4"/>
            </svg>
          </span>
          <strong class="mp-menu-card__name" id="menu-host-name"></strong>
          <span class="mp-menu-card__desc" id="menu-host-desc"></span>
        </button>
        <button type="button" class="mp-menu-card" id="menu-join">
          <span class="mp-menu-card__badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 4.5h4a1.5 1.5 0 0 1 1.5 1.5v12a1.5 1.5 0 0 1-1.5 1.5h-4"/>
              <path d="M4 12h10.5"/>
              <path d="m10.5 8 4 4-4 4"/>
            </svg>
          </span>
          <strong class="mp-menu-card__name" id="menu-join-name"></strong>
          <span class="mp-menu-card__desc" id="menu-join-desc"></span>
        </button>
        <button type="button" class="mp-menu-card mp-menu-card--restore" id="menu-restore" hidden>
          <span class="mp-menu-card__badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3.5 12a8.5 8.5 0 1 0 2.6-6.1L3.5 8.4"/>
              <path d="M3.5 3.5v4.9h4.9"/>
              <path d="M12 8v4.5l3 1.8"/>
            </svg>
          </span>
          <strong class="mp-menu-card__name" id="menu-restore-name"></strong>
          <span class="mp-menu-card__desc" id="menu-restore-desc"></span>
        </button>
      </div>
      <section class="side-card mp-how" aria-labelledby="how-title">
        <h3 class="side-title" id="how-title"></h3>
        <p class="mp-how__item" id="how-body-1"></p>
        <p class="mp-how__item" id="how-body-2"></p>
        <p class="mp-how__item" id="how-body-3"></p>
        <p class="mp-how__item" id="how-body-4"></p>
      </section>
      <p class="callout callout--warning" id="webrtc-unsupported" hidden></p>
    </section>

    <!-- Lobby + game table -->
    <section class="mp-screen mp-screen--table" id="screen-room" hidden>
      <div class="mp-room-header">
        <h2 class="mp-title" id="room-title"></h2>
        <span class="badge" id="room-phase-badge"></span>
      </div>
      <p class="callout callout--warning" id="room-banner" hidden></p>

      <div class="mp-room-layout">
        <div class="mp-room-main">
          <section class="table mp-lobby" id="mp-lobby" hidden>
            <p class="table-message" id="mp-lobby-message"></p>
          </section>
          <section class="table mp-table" id="mp-table" hidden>
            <section class="hand-area hand-area--dealer" aria-labelledby="mp-dealer-label">
              <header class="hand-header">
                <h3 class="hand-name" id="mp-dealer-label"></h3>
                <span class="hand-total" id="mp-dealer-total" hidden></span>
              </header>
              <div class="cards" id="mp-dealer-cards"></div>
            </section>
            <p class="table-message" id="mp-table-message"></p>
            <div class="mp-seats" id="mp-seats"></div>
          </section>

          <section class="controls" id="mp-controls" hidden aria-labelledby="mp-controls-label">
            <h3 class="sr-only" id="mp-controls-label"></h3>
            <div class="status-strip">
              <div class="stat">
                <span class="stat__label" id="mp-bankroll-label"></span>
                <strong class="stat__value" id="mp-bankroll-value"></strong>
              </div>
              <div class="stat stat--bet">
                <span class="stat__label" id="mp-bet-label"></span>
                <strong class="stat__value" id="mp-bet-value"></strong>
              </div>
              <span class="shoe-count" id="mp-shoe-count"></span>
            </div>

            <div id="mp-panel-bet" class="panel" hidden>
              <p class="panel__prompt" id="mp-bet-prompt"></p>
              <div class="chip-row" id="mp-chip-row" role="group"></div>
              <div class="button-row">
                <button type="button" id="mp-btn-clear" class="btn"></button>
                <button type="button" id="mp-btn-bet" class="btn btn--primary"></button>
                <button type="button" id="mp-btn-ready" class="btn btn--primary" aria-pressed="false"></button>
              </div>
              <p class="fine-print" id="mp-table-range"></p>
            </div>

            <div id="mp-panel-actions" class="panel" hidden>
              <div class="button-row button-row--actions" role="group" aria-labelledby="mp-controls-label">
                <button type="button" data-action="HIT" class="btn btn--action btn--action-primary">
                  <span class="btn__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="6" y="3.5" width="12" height="17" rx="2.2"/>
                      <path d="M12 8.75v6.5M8.75 12h6.5"/>
                    </svg>
                  </span>
                  <span class="btn__label"></span>
                </button>
                <button type="button" data-action="STAND" class="btn btn--action btn--action-primary">
                  <span class="btn__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M18 11V6a2 2 0 0 0-4 0v5"/>
                      <path d="M14 10V4a2 2 0 0 0-4 0v2"/>
                      <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
                      <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
                    </svg>
                  </span>
                  <span class="btn__label"></span>
                </button>
                <button type="button" data-action="DOUBLE" class="btn btn--action btn--action-secondary">
                  <span class="btn__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <ellipse cx="12" cy="7" rx="7" ry="3"/>
                      <path d="M5 7v4.75c0 1.66 3.13 3 7 3s7-1.34 7-3V7"/>
                      <path d="M5 11.75v4.75c0 1.66 3.13 3 7 3s7-1.34 7-3v-4.75"/>
                    </svg>
                  </span>
                  <span class="btn__label"></span>
                </button>
                <button type="button" data-action="SPLIT" class="btn btn--action btn--action-secondary">
                  <span class="btn__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 21v-7"/>
                      <path d="M12 14 5.5 7.5m6.5 6.5 6.5-6.5"/>
                      <path d="M10 7.5H5.5V12"/>
                      <path d="M14 7.5h4.5V12"/>
                    </svg>
                  </span>
                  <span class="btn__label"></span>
                </button>
                <button type="button" data-action="SURRENDER" class="btn btn--action"></button>
              </div>
            </div>

            <div id="mp-panel-decision" class="panel" role="dialog" aria-modal="true" tabindex="-1"
              aria-labelledby="mp-decision-question" hidden>
              <p class="panel__prompt" id="mp-decision-question"></p>
              <div class="button-row">
                <button type="button" id="mp-btn-decision-no" class="btn"></button>
                <button type="button" id="mp-btn-decision-yes" class="btn btn--primary"></button>
              </div>
            </div>

            <div id="mp-panel-wait" class="panel" hidden>
              <p class="panel__prompt" id="mp-wait-message"></p>
            </div>
          </section>

          <p class="fictional-note" id="fictional-note"></p>
        </div>

        <aside class="mp-room-side">
          <section class="side-card" aria-labelledby="mp-players-title">
            <h3 class="side-title" id="mp-players-title"></h3>
            <ul class="mp-player-list" id="mp-player-list"></ul>
            <div class="button-row mp-side-actions">
              <button type="button" class="btn" id="btn-invite" hidden></button>
            </div>
          </section>

          <section class="side-card" id="mp-host-controls" hidden aria-labelledby="mp-host-controls-title">
            <h3 class="side-title" id="mp-host-controls-title"></h3>
            <div class="mp-host-buttons">
              <button type="button" class="btn btn--primary" id="btn-start-game" hidden></button>
              <button type="button" class="btn btn--primary" id="btn-start-round" hidden></button>
              <button type="button" class="btn btn--primary" id="btn-next-round" hidden></button>
              <button type="button" class="btn" id="btn-pause" hidden aria-pressed="false"></button>
              <button type="button" class="btn btn--danger" id="btn-end-room"></button>
            </div>
            <p class="fine-print" id="mp-host-note"></p>
          </section>

          <section class="side-card" id="mp-leave-card" hidden>
            <button type="button" class="btn" id="btn-leave-room"></button>
          </section>

          <section class="side-card history" aria-labelledby="mp-history-title">
            <h3 class="side-title" id="mp-history-title"></h3>
            <ol class="history__list" id="mp-history-list"></ol>
            <p class="history__empty fine-print" id="mp-history-empty"></p>
          </section>
        </aside>
      </div>
    </section>
  </main>

  <div class="sr-only" aria-live="polite" id="live-region"></div>
  <div class="toast" id="toast" role="status" hidden></div>

  <!-- Host a local game -->
  <dialog class="dialog dialog--form" id="dialog-host" aria-labelledby="host-setup-title">
    <header class="dialog__header">
      <h2 id="host-setup-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <form class="dialog__body mp-form" id="host-setup-form" novalidate>
      <div class="field">
        <label for="host-room-name" id="host-room-name-label"></label>
        <input class="text-input" type="text" id="host-room-name" maxlength="24" autocomplete="off">
      </div>
      <div class="field">
        <label for="host-name" id="host-name-label"></label>
        <input class="text-input" type="text" id="host-name" maxlength="24" autocomplete="off">
      </div>
      <div class="field">
        <label id="host-max-players-label"></label>
        <div id="host-max-players-mount"></div>
      </div>
      <div class="switch-row">
        <!-- A span, not a label: the switch is named through aria-labelledby
             and only the switch itself is a hit target. -->
        <span class="switch-row__label" id="host-plays-label"></span>
        <button type="button" id="host-plays" class="switch" role="switch" aria-checked="true" aria-labelledby="host-plays-label">
          <span class="switch__knob"></span>
        </button>
      </div>
      <div class="field">
        <label id="host-profile-label"></label>
        <div id="host-profile-mount"></div>
      </div>
      <div class="field">
        <label for="host-bankroll" id="host-bankroll-label"></label>
        <input class="text-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" id="host-bankroll" value="1000">
      </div>
      <div class="mp-form-row">
        <div class="field">
          <label for="host-min-bet" id="host-min-bet-label"></label>
          <input class="text-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" id="host-min-bet" value="5">
        </div>
        <div class="field">
          <label for="host-max-bet" id="host-max-bet-label"></label>
          <input class="text-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" id="host-max-bet" value="1000">
        </div>
      </div>
      <p class="field__error" id="host-setup-error" role="alert" hidden></p>
      <div class="button-row">
        <button type="submit" class="btn btn--primary" id="host-setup-create"></button>
      </div>
    </form>
  </dialog>

  <!-- Join a local game -->
  <dialog class="dialog dialog--form" id="dialog-join" aria-labelledby="join-title">
    <div class="dialog__page" id="join-page-start">
      <header class="dialog__header">
        <h2 id="join-title"></h2>
        <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
      </header>
      <div class="dialog__body mp-form">
        <div class="field">
          <label for="join-name" id="join-name-label"></label>
          <input class="text-input" type="text" id="join-name" maxlength="24" autocomplete="off">
        </div>
        <p class="callout" id="join-resume-note" hidden></p>
        <fieldset class="field-group">
          <legend id="join-step1-title"></legend>
          <p class="fine-print" id="join-step1-body"></p>
          <div class="field">
            <!-- Pairing codes are case-sensitive base64url: phone keyboards
                 must not capitalise or autocorrect anything the sender did
                 not type. Only the BJL1C/BJL1P marker is uppercase. -->
            <textarea class="text-input mp-code-input" id="join-offer-input" rows="4" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
          </div>
          <div class="mp-scanner" id="join-scanner" hidden>
            <div class="mp-scanner__preview">
              <!-- No autoplay: the QR decoder starts on the `play` event it
                   triggers itself, so the browser must not start playback. -->
              <video id="join-video" playsinline muted></video>
            </div>
            <button type="button" class="btn" id="join-scan-stop"></button>
          </div>
          <p class="field__error" id="join-error" role="alert" hidden></p>
          <div class="button-row">
            <button type="button" class="btn" id="join-scan"></button>
            <button type="button" class="btn btn--primary" id="join-continue"></button>
          </div>
        </fieldset>
      </div>
    </div>
    <div class="dialog__page" id="join-page-answer" hidden>
      <header class="dialog__header dialog__header--sub">
        <button type="button" id="join-answer-back" class="btn btn--ghost btn--icon dialog__back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5"/>
            <path d="m12 19-7-7 7-7"/>
          </svg>
        </button>
        <h2 id="join-step2-title" tabindex="-1"></h2>
        <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
      </header>
      <div class="dialog__body mp-form">
        <p class="fine-print" id="join-step2-body"></p>
        <div class="mp-qr" id="join-answer-qr" role="img"></div>
        <div class="field">
          <textarea class="text-input mp-code-input" id="join-answer-output" rows="4" readonly spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
        </div>
        <div class="button-row">
          <button type="button" class="btn" id="join-answer-copy"></button>
          <button type="button" class="btn" id="join-answer-share" hidden></button>
        </div>
        <p class="mp-waiting" id="join-waiting"></p>
      </div>
    </div>
  </dialog>

  <!-- Host pairing wizard -->
  <dialog class="dialog dialog--wide" id="dialog-invite" aria-labelledby="invite-title">
    <header class="dialog__header">
      <h2 id="invite-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" id="invite-close"></button>
    </header>
    <div class="dialog__body mp-invite-grid">
      <section class="mp-invite-step">
        <h3 class="side-title" id="invite-step1-title"></h3>
        <p class="fine-print" id="invite-step1-body"></p>
        <p class="mp-waiting" id="invite-generating"></p>
        <div class="mp-qr" id="invite-offer-qr" role="img"></div>
        <div class="field">
          <textarea class="text-input mp-code-input" id="invite-offer-output" rows="4" readonly spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
        </div>
        <div class="button-row">
          <button type="button" class="btn" id="invite-copy"></button>
          <button type="button" class="btn" id="invite-share" hidden></button>
        </div>
      </section>
      <section class="mp-invite-step">
        <h3 class="side-title" id="invite-step2-title"></h3>
        <p class="fine-print" id="invite-step2-body"></p>
        <div class="field">
          <textarea class="text-input mp-code-input" id="invite-answer-input" rows="4" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
        </div>
        <div class="button-row">
          <button type="button" class="btn" id="invite-scan"></button>
          <button type="button" class="btn btn--primary" id="invite-connect"></button>
        </div>
        <div class="mp-scanner" id="invite-scanner" hidden>
          <div class="mp-scanner__preview">
            <!-- No autoplay: see the join-video comment. -->
            <video id="invite-video" playsinline muted></video>
          </div>
          <button type="button" class="btn" id="invite-scan-stop"></button>
        </div>
        <p class="field__error" id="invite-error" role="alert" hidden></p>
      </section>
    </div>
  </dialog>

  <!-- Settings: the same dialog as the solo table. Sections the room cannot
       change are rendered disabled by settingsView's multiplayer mode. -->
  <dialog class="dialog dialog--wide" id="dialog-settings" aria-labelledby="settings-title">
    <div class="dialog__page" id="settings-page-main">
    <header class="dialog__header">
      <h2 id="settings-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <div class="dialog__body" id="settings-body">
      <fieldset class="field-group">
        <legend id="set-language-label"></legend>
        <div class="segment" id="settings-language" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-appearance-label"></legend>
        <div class="segment" id="settings-appearance" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-theme-label"></legend>
        <div class="theme-list" id="settings-theme" role="radiogroup"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-animations-label"></legend>
        <div class="segment" id="settings-animations" role="radiogroup"></div>
        <p class="fine-print" id="animations-note"></p>
        <p class="fine-print" id="animations-reduced-note" hidden></p>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-shortcut-labels-label"></legend>
        <div class="audio-controls" id="shortcut-label-controls"></div>
        <p class="fine-print" id="shortcut-labels-note"></p>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-strategy-hints-label"></legend>
        <div class="audio-controls" id="strategy-hint-controls"></div>
        <p class="fine-print" id="strategy-hints-note"></p>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-audio-label"></legend>
        <div class="audio-controls" id="audio-controls"></div>
      </fieldset>
      <fieldset class="field-group">
        <legend id="set-profile-label"></legend>
        <p class="fine-print" id="profile-note"></p>
        <div class="profile-list" id="profile-list" role="radiogroup"></div>
        <p class="fine-print" id="profile-change-note"></p>
      </fieldset>
      <form class="custom-editor" id="custom-editor" hidden></form>
      <div class="field-group field-group--danger">
        <button type="button" id="btn-set-bankroll" class="btn btn--danger"></button>
        <p class="fine-print" id="bankroll-locked-note" hidden></p>
      </div>
      <div class="field-group field-group--info">
        <button type="button" id="btn-open-info" class="btn info-entry">
          <span id="btn-open-info-label"></span>
          <svg class="info-entry__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m9 6 6 6-6 6"/>
          </svg>
        </button>
      </div>
    </div>
    </div>
    <div class="dialog__page" id="settings-page-info" hidden>
      <header class="dialog__header dialog__header--sub">
        <button type="button" id="btn-info-back" class="btn btn--ghost btn--icon dialog__back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5"/>
            <path d="m12 19-7-7 7-7"/>
          </svg>
        </button>
        <h2 id="info-title" tabindex="-1"></h2>
        <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
      </header>
      <div class="dialog__body info-body" id="info-body"></div>
    </div>
  </dialog>

  <dialog class="dialog dialog--wide" id="dialog-help" aria-labelledby="help-title">
    <header class="dialog__header">
      <h2 id="help-title"></h2>
      <button type="button" class="btn btn--ghost dialog__close" data-close-dialog></button>
    </header>
    <div class="dialog__body" id="help-body"></div>
  </dialog>

  <!-- Generic confirmation -->
  <dialog class="dialog dialog--confirm" id="dialog-confirm" aria-labelledby="confirm-title">
    <header class="dialog__header">
      <h2 id="confirm-title"></h2>
    </header>
    <div class="dialog__body">
      <p id="confirm-body"></p>
      <div class="button-row">
        <button type="button" class="btn" id="confirm-cancel"></button>
        <button type="button" class="btn btn--danger" id="confirm-accept"></button>
      </div>
    </div>
  </dialog>

  <script type="module" src="src/js/multiplayer/ui/mpApp.js"></script>
</body>
</html>
